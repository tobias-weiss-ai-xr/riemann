services:
  # ── Main Research Environment ──────────────────────────────────
  research:
    build:
      context: ./research
      dockerfile: Dockerfile
    container_name: riemann-research
    volumes:
      - ./:/workspace
      - pip-cache:/home/researcher/.cache/pip
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
      - "${TENSORBOARD_PORT:-6006}:6006"
    environment:
      - PYTHONPATH=/workspace/scripts:/workspace/knowledge-graph/scripts
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-riemann-research}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    depends_on:
      neo4j:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: '16gb'
    stdin_open: true
    tty: true
    networks:
      - riemann-net

  # ── Local Knowledge Graph (Neo4j) ─────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: riemann-neo4j
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - ./knowledge-graph/cypher:/import/cypher:ro
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-riemann-research}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - riemann-net

  # ── SageMath (optional — for ihara_zeta, modular forms) ───────
  # Usage: docker compose --profile sage up
  sagemath:
    image: sagemath/sagemath:10.8
    container_name: riemann-sagemath
    profiles:
      - sage
    ports:
      - "8889:8888"
    volumes:
      - ./notebooks:/home/sage/shared
    command: sage -notebook jupyter --ip=0.0.0.0 --no-browser
    networks:
      - riemann-net

volumes:
  pip-cache:
  neo4j-data:
  neo4j-logs:

networks:
  riemann-net:
    driver: bridge
